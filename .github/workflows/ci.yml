name: Python CI Pipeline

# Вказуємо, коли запускати цей workflow (при пуші в main)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # Вказуємо віртуальне середовище, яке надає GitHub (безкоштовний сервер)
    runs-on: ubuntu-latest

    steps:
    # Крок 1: Завантаження коду з репозиторію
    - name: Checkout repository
      uses: actions/checkout@v4

    # Крок 2: Налаштування Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    # Крок 3: Встановлення залежностей (етап Build)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Крок 4: Запуск тестів (етап Test)
    - name: Run tests
      run: |
        python -m pytest tests/